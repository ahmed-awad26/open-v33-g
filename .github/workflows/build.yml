name: Build OpenContacts APK

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── JDK 17 ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Permissions ───────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Build debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Upload debug APK ──────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenContacts-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Build release APK (unsigned) ──────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Upload unsigned release APK ───────────────────────────────────────
      - name: Upload Unsigned Release APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenContacts-release-unsigned-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90

      # ── Sign APK (continue-on-error so build never fails without secrets) ─
      - name: Sign Release APK
        id: sign_release
        uses: r0adkll/sign-android-release@v1
        continue-on-error: true
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # ── Upload signed APK only if signing succeeded ────────────────────────
      - name: Upload Signed Release APK
        if: steps.sign_release.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: OpenContacts-release-signed-${{ github.run_number }}
          path: ${{ steps.sign_release.outputs.signedReleaseFile }}
          retention-days: 90

      # ── GitHub Release on tag push ────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
